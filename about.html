<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us | JR Electradrive</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --red: #E31E24;
    --dark: #0a0a0a;
    --gray: #b3b3b3;
    --white: #ffffff;
    --gold: #FFD700;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--dark);
    color: var(--white);
}

/* NAVBAR */
header {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
}

.logo img {
    height: 50px;
}

/* MOBILE MENU */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

.nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-weight: 700;
    font-size: 0.9rem;
}

/* HERO */
.hero {
    padding: 120px 5% 60px;
    text-align: center;
}

.hero h1 {
    font-size: clamp(2rem, 8vw, 3rem);
    margin-bottom: 20px;
}

.hero p {
    color: var(--gray);
}

/* SECTION */
.section {
    padding: 60px 5%;
    text-align: center;
}

.grid {
    display: grid;
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
}

/* FEEDBACK */
.feedback {
    padding: 60px 5%;
    text-align: center;
}

.star {
    font-size: 2rem;
    cursor: pointer;
    color: var(--gray);
}

.star.active {
    color: var(--gold);
}

textarea {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
}

button {
    margin-top: 15px;
    padding: 15px;
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 30px;
}

/* FOOTER */
footer {
    padding: 40px 5%;
    text-align: center;
    color: var(--gray);
}

/* MOBILE */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: black;
        flex-direction: column;
        display: none;
        text-align: center;
        padding: 20px 0;
    }

    .nav-links.active {
        display: flex;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}

/* DESKTOP */
@media (min-width: 769px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
    }
}
</style>
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="e57fb09b-db12-4a2b-b3ca-77a7db54df98.png">
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul class="nav-links" id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="#" style="color: var(--red);">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>About JR Electradrive</h1>
    <p>We provide premium auto electrical services across Harare with reliability and expertise.</p>
</section>

<section class="section">
    <h2>Our Services</h2>
    <div class="grid">
        <div class="card">⚡ Diagnostics</div>
        <div class="card">🔌 Wiring</div>
        <div class="card">🚛 Fleet Support</div>
    </div>
</section>

<section class="feedback">
    <h2>Rate Our Service</h2>

    <div id="stars">
        <span class="star" onclick="rate(1)">★</span>
        <span class="star" onclick="rate(2)">★</span>
        <span class="star" onclick="rate(3)">★</span>
        <span class="star" onclick="rate(4)">★</span>
        <span class="star" onclick="rate(5)">★</span>
    </div>

    <textarea placeholder="Write feedback..."></textarea>
    <button onclick="sendFeedback()">Submit</button>
</section>

<footer>
    <p>© 2026 JR Electradrive - Harare</p>
</footer>

<script>
let rating = 0;

function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function rate(num) {
    rating = num;
    document.querySelectorAll(".star").forEach((s, i) => {
        s.classList.toggle("active", i < num);
    });
}

function sendFeedback() {
    if (rating === 0) {
        alert("Select rating");
        return;
    }

    const text = document.querySelector("textarea").value;
    window.open(`https://wa.me/263787747619?text=Rating: ${rating}/5 - ${text}`);
}
</script>

</body>
</html>
