<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | JR Electradrive</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --red: #E31E24;
    --dark-bg: #090909;
    --surface: rgba(255,255,255,0.06);
    --white: #ffffff;
    --gray: #b3b3b3;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Montserrat',sans-serif;
    background:var(--dark-bg);
    color:var(--white);
}

/* NAV */
header {
    position:fixed;
    width:100%;
    top:0;
    background:#000000cc;
    backdrop-filter: blur(10px);
    z-index:1000;
}

.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
}

.logo img { height:55px; }

.nav-links {
    display:flex;
    gap:18px;
    list-style:none;
}

.nav-links a {
    color:white;
    text-decoration:none;
    font-size:0.9rem;
    font-weight:700;
}

/* HERO */
.contact-hero {
    padding:140px 5% 60px;
    text-align:center;
}

.contact-hero h1 {
    font-size:clamp(2rem,5vw,3rem);
    margin-bottom:15px;
}

.contact-hero p {
    color:var(--gray);
}

/* CONTACT SECTION */
.contact-panel {
    padding:40px 5%;
    display:grid;
    gap:30px;
}

.contact-card {
    background:var(--surface);
    padding:25px;
    border-radius:20px;
}

/* BUTTONS */
.btn-call, .btn-wa {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:16px;
    border-radius:999px;
    font-weight:900;
    text-decoration:none;
    color:white;
}

.btn-call { background:var(--red); }
.btn-wa { background:#25D366; }

/* 🔥 PREMIUM SOCIALS */
.social-title {
    margin-top:30px;
    margin-bottom:15px;
    color:var(--gray);
    font-size:0.8rem;
    letter-spacing:2px;
}

.social-grid {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

/* Base */
.social-icon {
    width:65px;
    height:65px;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6rem;
    text-decoration:none;
    color:white;
    position:relative;
    overflow:hidden;
    transition:0.3s ease;
}

/* Facebook */
.facebook {
    background:#1877f2;
    box-shadow:0 0 0 rgba(24,119,242,0.6);
}

/* Instagram gradient */
.instagram {
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

/* TikTok */
.tiktok {
    background:#000;
}

/* Glow effect */
.social-icon::after {
    content:'';
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.15);
    opacity:0;
    transition:0.3s;
}

/* Hover */
.social-icon:hover {
    transform:translateY(-5px) scale(1.08);
}

.social-icon:hover::after {
    opacity:1;
}

/* TikTok glow */
.tiktok:hover {
    box-shadow:0 0 20px #00f2ea, 0 0 40px #ff0050;
}

/* Facebook glow */
.facebook:hover {
    box-shadow:0 0 20px #1877f2;
}

/* Instagram glow */
.instagram:hover {
    box-shadow:0 0 20px #dd2a7b;
}

/* MOBILE */
@media(max-width:768px){
    .nav-links {
        flex-wrap:wrap;
        justify-content:center;
    }
}
</style>
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="e57fb09b-db12-4a2b-b3ca-77a7db54df98.png">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="order.html">Book</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="contact-hero">
    <h1>Contact JR Electradrive</h1>
    <p>Fast, premium auto electrical support in Harare.</p>
</section>

<section class="contact-panel">

    <div class="contact-card">
        <h3>Contact Info</h3>
        <p>📍 Harare, Zimbabwe</p>
        <p>📞 +263 787 747 619</p>

        <div style="margin-top:20px; display:grid; gap:12px;">
            <a href="tel:+263787747619" class="btn-call">
                <i class="fas fa-phone"></i> Call Now
            </a>
            <a href="https://wa.me/263787747619" class="btn-wa">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>

        <!-- 🔥 PREMIUM SOCIALS -->
        <p class="social-title">FOLLOW US</p>

        <div class="social-grid">

            <a href="https://www.facebook.com/JrElectradrive" target="_blank" class="social-icon facebook">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="https://www.instagram.com/jrelectradrive_auto" target="_blank" class="social-icon instagram">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://www.tiktok.com/@jrelectradrive_auto" target="_blank" class="social-icon tiktok">
                <i class="fab fa-tiktok"></i>
            </a>

        </div>
    </div>

</section>

</main>

</body>
</html>
