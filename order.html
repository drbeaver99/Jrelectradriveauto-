<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Service | JR Electradrive</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --red: #E31E24;
    --dark-bg: #090909;
    --surface: rgba(255,255,255,0.06);
    --white: #ffffff;
    --gray: #b3b3b3;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--dark-bg);
    color: var(--white);
}

/* NAV */
header {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 5%;
}

.logo img { max-height: 60px; }

.nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
}

.nav-links a:hover { color: var(--red); }

/* HERO */
.order-hero {
    padding: 160px 5% 80px;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('1776086040281.png');
    background-size: cover;
}

.order-hero h1 {
    font-size: clamp(2.5rem, 5vw, 4rem);
    margin-bottom: 20px;
}

.order-hero p {
    color: var(--gray);
    max-width: 600px;
    margin: auto;
    margin-bottom: 30px;
}

.btn {
    background: var(--red);
    padding: 14px 30px;
    border-radius: 999px;
    color: white;
    font-weight: 900;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(227,30,36,0.5);
}

/* FORM */
.order-section {
    padding: 60px 5%;
    max-width: 900px;
    margin: auto;
}

.form-card {
    background: var(--surface);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
}

.form-group { margin-bottom: 18px; }

label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.85rem;
    color: var(--red);
    font-weight: 700;
}

input, select, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #111;
    color: white;
}

input:focus, textarea:focus, select:focus {
    border-color: var(--red);
    outline: none;
}

textarea { min-height: 120px; }

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--red);
    border: none;
    border-radius: 999px;
    font-weight: 900;
    margin-top: 10px;
    cursor: pointer;
}

.submit-btn:hover {
    background: white;
    color: var(--red);
}

/* FOOTER */
.footer {
    padding: 50px 5%;
    text-align: center;
    color: var(--gray);
}

/* FLOATING BUTTON */
.floating-whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 12px 18px;
    border-radius: 999px;
    font-weight: 900;
    text-decoration: none;
    color: black;
}

/* MOBILE */
@media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    .nav-links { flex-wrap: wrap; justify-content: center; }
}
</style>
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="e57fb09b-db12-4a2b-b3ca-77a7db54df98.png">
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="order.html" style="color:#E31E24;">Book</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="order-hero">
    <h1>Book Your Service</h1>
    <p>Fast, professional auto electrical diagnostics and repair. Send your request directly via WhatsApp.</p>
    <a href="https://wa.me/263787747619" class="btn">Message on WhatsApp</a>
</section>

<section class="order-section">

<div class="form-card">
<form id="whatsappForm">

<div class="form-row">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Location</label>
<input type="text" id="location" required>
</div>

<div class="form-group">
<label>Vehicle Type</label>
<select id="vehicleType">
<option>Car</option>
<option>Truck</option>
<option>Motorcycle</option>
</select>
</div>
</div>

<div class="form-group">
<label>Vehicle Brand</label>
<input type="text" id="brand" required>
</div>

<div class="form-group">
<label>Service Needed</label>
<select id="service">
<option>Diagnostics</option>
<option>Wiring Repair</option>
<option>Alternator</option>
<option>Battery</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Problem Description</label>
<textarea id="fault"></textarea>
</div>

<button type="submit" class="submit-btn">Send to WhatsApp</button>

</form>
</div>

</section>

<footer class="footer">
<p>© 2026 JR Electradrive • Harare, Zimbabwe</p>
</footer>

<a class="floating-whatsapp" href="https://wa.me/263787747619">💬 WhatsApp</a>

</main>

<script>
document.getElementById('whatsappForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const loc = document.getElementById('location').value;
    const vType = document.getElementById('vehicleType').value;
    const brand = document.getElementById('brand').value;
    const service = document.getElementById('service').value;
    const fault = document.getElementById('fault').value || "No description";

    const msg = `*SERVICE BOOKING*%0A
Name: ${name}%0A
Email: ${email}%0A
Location: ${loc}%0A
Vehicle: ${vType} (${brand})%0A
Service: ${service}%0A
Problem: ${fault}`;

    window.open(`https://wa.me/263787747619?text=${msg}`, '_blank');
});
</script>

</body>
</html>
